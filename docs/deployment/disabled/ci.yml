name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build
        env:
          NEXT_PUBLIC_BASE_URL: https://purrpik.co.kr
      - run: bun run test
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:e2e
